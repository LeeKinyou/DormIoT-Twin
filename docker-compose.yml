services:
  emqx:
    image: emqx/emqx:5.8
    restart: always
    ports:
      - "1883:1883"      # MQTT
      - "8083:8083"      # MQTT WebSocket
      - "18083:18083"    # EMQX Dashboard
    environment:
      EMQX_NAME: dormiot
      EMQX_HOST: 127.0.0.1
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: dormiot
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dormiot123}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  mysql_data:
